name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short -m "not cmake"

  cmake-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            generator: "Unix Makefiles"
          - os: ubuntu-latest
            generator: "Ninja"
          - os: windows-latest
            generator: "Visual Studio 17 2022"
          - os: windows-latest
            generator: "Ninja"

    runs-on: ${{ matrix.os }}
    name: cmake (${{ matrix.os }}, ${{ matrix.generator }})
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Ninja (Linux)
        if: matrix.generator == 'Ninja' && runner.os == 'Linux'
        run: sudo apt-get install -y ninja-build

      - name: Install Ninja (Windows)
        if: matrix.generator == 'Ninja' && runner.os == 'Windows'
        run: choco install ninja

      - name: Setup MSVC environment
        if: runner.os == 'Windows' && matrix.generator == 'Ninja'
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Install pytest
        run: pip install pytest

      - name: Run CMake tests
        env:
          CMAKE_GENERATOR: ${{ matrix.generator }}
        run: python -m pytest tests/ -v -m cmake --tb=short
