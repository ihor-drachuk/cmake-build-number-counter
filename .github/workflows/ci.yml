name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short -m "not cmake"

  cmake-tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            generator: "Unix Makefiles"
          - os: ubuntu-latest
            generator: "Ninja"
          - os: windows-latest
            generator: "Visual Studio 17 2022"
          - os: windows-latest
            generator: "Ninja"

    runs-on: ${{ matrix.os }}
    name: cmake (${{ matrix.os }}, ${{ matrix.generator }})
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Ninja (Linux)
        if: matrix.generator == 'Ninja' && runner.os == 'Linux'
        run: sudo apt-get install -y ninja-build

      - name: Install Ninja (Windows)
        if: matrix.generator == 'Ninja' && runner.os == 'Windows'
        run: choco install ninja

      - name: Setup MSVC environment
        if: runner.os == 'Windows' && matrix.generator == 'Ninja'
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Install pytest
        run: pip install pytest

      - name: Run CMake tests
        env:
          CMAKE_GENERATOR: ${{ matrix.generator }}
        run: python -m pytest tests/ -v -m cmake --tb=short

  docker-test:
    needs: python-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t cbnc-server:test .

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install pytest

      - name: Run Docker tests
        env:
          CBNC_TEST_DOCKER: "1"
          CBNC_DOCKER_IMAGE: cbnc-server:test
        run: python -m pytest tests/test_docker.py -v --tb=short

  docker-push:
    needs: [python-tests, cmake-tests, docker-test]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=prod" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "dev" ]; then
            echo "tag=stage" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cbnc-server:${{ steps.tag.outputs.tag }}
